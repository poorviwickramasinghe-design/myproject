# =============================================
# Smart Student Budget Tracker - Backend Config
# =============================================

server.port=8080
spring.application.name=smart-budget-backend

# =============================================
# Firebase Configuration
# =============================================
# Path to your Firebase service account key JSON file
# Download from: Firebase Console -> Project Settings -> Service Accounts
firebase.service-account-path=classpath:firebase-service-account.json
firebase.database-url=https://smartbudgetapplication-ef18b-default-rtdb.firebaseio.com

# =============================================
# Firebase Cloud Messaging (FCM)
# =============================================
# FCM is handled through Firebase Admin SDK (no extra key needed)

# =============================================
# Budget Alert Thresholds
# =============================================
budget.alert.warning-percent=80
budget.alert.exceeded-percent=100

# =============================================
# Scheduler Settings
# =============================================
# Monthly summary: runs at 8:00 AM on the 1st of every month
scheduler.monthly-summary.cron=0 0 8 1 * ?
# Budget check: runs every hour
scheduler.budget-check.cron=0 0 * * * ?

# =============================================
# CORS Settings
# =============================================
cors.allowed-origins=*

# =============================================
# Logging
# =============================================
logging.level.com.smartbudget=DEBUG
logging.level.org.springframework.security=WARN
